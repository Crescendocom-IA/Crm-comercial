# Funções públicas: recebem chamadas de terceiros (webhooks, pixels de tracking,
# API REST pública, health check) que não carregam um JWT de usuário do Supabase.
# Cada uma faz a própria autenticação (api_key, assinatura ou org_id).

[functions.health]
verify_jwt = false

[functions.tracking]
verify_jwt = false

[functions.inbound-webhook]
verify_jwt = false

[functions.public-api]
verify_jwt = false

# dispatch-webhook NÃO é público: só o app autenticado o chama (via fireWebhook /
# botão de teste em Integrações, ambos por supabase.functions.invoke, que anexa o
# JWT do usuário). verify_jwt = true (explícito, porque a função foi deployada
# antes com false e só um valor explícito reverte isso) faz o gateway exigir esse
# JWT e bloquear chamadas anônimas de terceiros.
[functions.dispatch-webhook]
verify_jwt = true
